<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附魔战力系统</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>
<!-- 加载弹窗 -->
<div class="load-background" id="loadBackground"></div>
<div id="loadDiag" class="loader"></div>
<div id="loadDiag_info"></div>

    <!-- 顶侧栏 -->
    <div class="top-bar">
        <div class="title" onclick="showCustomDialog_setting()">
            <img src="./favicon.webp" alt="logo" class="title-logo">
            <span>巅峰附魔系统</span>
        </div>
        <!-- 点券、白石和彩玉数量 -->
        <div id="resources">
            <div>
                <span>💵&nbsp;点券: <span id="money">0</span></span>
                <button class="add-button" onclick="updateShop_money();openShop()">+</button>
            </div>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <div>
                <span>🪨&nbsp;白石: <span id="whiteStone">0</span></span>
                <button class="add-button" onclick="updateShop_whiteStone();openShop()">+</button>
            </div>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <div>
                <span>💎&nbsp;彩玉: <span id="colorGem">0</span></span>
                <button class="add-button" onclick="updateShop_colorGem();openShop()">+</button>
            </div>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 左侧栏 -->
        <div id="leftBar" class="left-bar">
            <!-- 附魔方案 -->
            <div id="enchantment-options" class="section-title">方案</div>
            <ul>
                <li><button id="eo_1" class="eo-button" onclick="switchEnchant(1)">1</button></li>
                <li><button id="eo_2" class="eo-button" onclick="switchEnchant(2)">2</button></li>
                <li><button id="eo_3" class="eo-button" onclick="switchEnchant(3)">3</button></li>
                <li><button id="eo_4" class="eo-button" onclick="switchEnchant(4)">4</button></li>
                <li><button id="eo_5" class="eo-button" onclick="switchEnchant(5)">5</button></li>
            </ul>
        </div>

        <!-- 武器区域 -->
        <div class="weaponList-container">
            <!-- 总战力 -->
            <div id="totalBattlePower" onclick="showCustomDialog_info();">
                总附魔战力: <span id="totalPower">0</span>
            </div>
            <!-- 武器信息 -->
            <div id="weapon_list" class="weapon-list"></div>
        </div>

        <!-- 词条详情 -->
        <div id="entry-detail-container">
            <div class="attributes-info-container" id="attributesInfocontainer">
                <div id="enchantment-info">附魔信息</div>
                <div id="attribute-list">
                    <!-- 随机词条显示 -->
                </div>
                <div id="weaponValue" class="weaponValue"></div>
            </div>
            <div id="refreshButton-container">
                <button id="refreshButton" class="refreshButton" onclick="refreshEnchant_unchecked()">刷新附魔</button>
                <div id="refreshCost">
                    （消耗: 白石 <span id="whiteStoneCost">100</span>，彩玉 <span id="colorGemCost">0</span>）
                </div>
            </div>
        </div>
    </div>

<!-- 购买弹窗 -->
<div class="shop-background" id="shopBackground"></div>
<div class="shop" id="shop">
    <h2 id="shopTitle">选择购买白石的档次</h2><br>
    <!-- 井字格布局按钮 -->
    <div id="purchase-buttons" class="purchase-buttons"></div>
    <button class="closeShop-btn" onclick="closeShop()">关闭</button>
</div>

<!-- 资源不足 -->
<div id="customDialog_NotEnough" class="custom-dialog">
    <div class="custom-dialog-content">
        <h2 class="h2_NotEnough">
            <svg t="1733540037388" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"
                p-id="4530">
                <path
                    d="M827.392 195.584q65.536 65.536 97.792 147.456t32.256 167.936-32.256 167.936-97.792 147.456-147.456 98.304-167.936 32.768-168.448-32.768-147.968-98.304-98.304-147.456-32.768-167.936 32.768-167.936 98.304-147.456 147.968-97.792 168.448-32.256 167.936 32.256 147.456 97.792zM720.896 715.776q21.504-21.504 18.944-49.152t-24.064-49.152l-107.52-107.52 107.52-107.52q21.504-21.504 24.064-49.152t-18.944-49.152-51.712-21.504-51.712 21.504l-107.52 106.496-104.448-104.448q-21.504-20.48-49.152-23.04t-49.152 17.92q-21.504 21.504-21.504 52.224t21.504 52.224l104.448 104.448-104.448 104.448q-21.504 21.504-21.504 51.712t21.504 51.712 49.152 18.944 49.152-24.064l104.448-104.448 107.52 107.52q21.504 21.504 51.712 21.504t51.712-21.504z"
                    p-id="4531"></path>
            </svg>
            错误！
        </h2><br>
        <div id="p_NotEnough_container" class="p_container"><br>
            <p id="p_NotEnough"></p><br><br>
            <button id="confirmButton_NotEnough" class="confirmButton">确认</button>
        </div>

    </div>
</div>
<!-- 珍贵属性未锁定 -->
<div id="customDialog_unlock" class="custom-dialog">
    <div class="custom-dialog-content">
        <h2 class="h2_unlock">
            <svg t="1733489872556" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"
                p-id="4285">
                <path
                    d="M544 789.333333h105.173333a10.666667 10.666667 0 0 0 10.666667-10.666666v-0.362667l-3.232-94.304a32 32 0 0 1 14.293333-27.765333C750.933333 603.189333 800 513.792 800 416c0-159.061333-128.938667-288-288-288S224 256.938667 224 416c0 97.813333 49.098667 187.232 129.141333 240.266667a32 32 0 0 1 14.314667 25.578666l3.338667 97.184a10.666667 10.666667 0 0 0 10.666666 10.304H480V572.693333l-76.64-81.429333a32 32 0 0 1 46.613333-43.861333l63.36 67.328 72.693334-68.661334a32 32 0 0 1 43.946666 46.528L544 573.792V789.333333z m320-373.333333a351.530667 351.530667 0 0 1-142.826667 283.146667l2.634667 76.96A74.666667 74.666667 0 0 1 649.173333 853.333333h-267.733333a74.666667 74.666667 0 0 1-74.624-72.106666l-2.784-81.194667A351.541333 351.541333 0 0 1 160 416C160 221.6 317.6 64 512 64s352 157.6 352 352zM416 960a32 32 0 0 1 0-64h192a32 32 0 0 1 0 64H416z"
                    fill="#000000" p-id="4286"></path>
            </svg>
            提示！
        </h2><br>
        <div id="p_NotEnough_container" class="p_container"><br>
            <p id="p_unlock">珍贵属性未锁定，是否选择继续刷新？</p><br><br>
            <button id="confirmButton_unlock" class="confirmButton">确认</button>
            <button id="cancelButton_unlock" class="cancelButton">取消</button>
        </div>

    </div>
</div>

<!-- 设置 -->
<div id="customDialog_setting" class="custom-dialog">
    <div class="custom-dialog-content" style="color: whitesmoke;background: linear-gradient(135deg,#c2ffd8,#465efb);">
        <h2 class="h2_setting">

            设置：
        </h2><br>
        <div id="p_setting_container" class="p_container" style="background: linear-gradient(135deg, #1488cc, #2b32b2)">
            <div id="p_setting_content"><br>
                <div id="select_rarity_alert" class="p_setting_item">
                    <span>1. 选择提示锁定的稀有度：&nbsp;&nbsp;</span>
                </div><br>
                <div id="developer_code_div" class="p_setting_item">
                    <span>2. 开发者模式：&nbsp;&nbsp;</span>
                    <input type="text" id="developer_code_input" placeholder="Enter the developer code!">
                    <button id="developer_code_button" onclick="developer_code_button_click()">开启</button>
                </div><br>
                <div id="developer_mode" class="p_setting_item" style="display: none;">
                    <span>方案:&nbsp;&nbsp;<span id="span_scheme"></span>&nbsp;&nbsp;&nbsp;</span>
                    <span>武器:&nbsp;&nbsp;<span id="span_weapon"></span>&nbsp;&nbsp;&nbsp;</span>
                    <span>词条:&nbsp;&nbsp;<span id="span_entry"></span>&nbsp;&nbsp;&nbsp;</span>
                    <br><br>
                    <span>属性:&nbsp;&nbsp;<span id="span_attribute"></span>&nbsp;&nbsp;&nbsp;</span>
                    <span>评级:&nbsp;&nbsp;<span id="span_rank"></span>&nbsp;&nbsp;&nbsp;</span>
                    <br><br>
                </div>
            </div>
            <div id="p_setting_buttons">
                <button id="confirmButton_setting" class="confirmButton">确认</button>
                <button id="cancelButton_setting" class="cancelButton">取消</button>
            </div>
        </div>

    </div>
</div>

<!-- 附魔信息 -->
<div id="customDialog_info" class="custom-dialog">
    <div class="custom-dialog-content" style="color: black;background: linear-gradient(135deg,#ffefba,#ffffff);">
        <h2 class="h2_info">
            附魔信息
        </h2><br>
        <div id="p_info_container" class="p_container"
            style="color: blue;background: linear-gradient(135deg,#fffc00,#ffffff)">
            <br>
            <div id="div_info">
            </div>
            </p><br><br>
        </div>
        <button id="confirmButton_info" class="confirmButton">确认</button>

    </div>
</div>

    <script src="./assets/js/app-core.js"></script>
    <script src="./assets/js/dialogs.js"></script>
    <script src="./assets/js/shop.js"></script>
    <script src="./assets/js/developer.js"></script>
    <script src="./assets/js/assets.js"></script>
</body>
</html>
